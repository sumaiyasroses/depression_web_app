{% extends "base.html" %}

{% block content %}

<div class="container">
    <h2>🤖 SAFA AI</h2>

    <div class="chat-box">
        {% for sender, message, timestamp in chats %}
            <p><b>{{ sender }}:</b> {{ message }}</p>
            <small>{{ timestamp }}</small>
        {% endfor %}
    </div>

    <form method="POST">
        <input type="text" name="message" placeholder="Tell me how you feel..." required>
        <button type="submit">Send</button>
    </form>
</div>

{% endblock %}
