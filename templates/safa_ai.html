{% extends "base.html" %}
{% block content %}

<style>

:root{
--violet:#7c3aed;
--bg:#f7f5ff;
}

/* PAGE CENTER */

.analyzer-wrapper{
display:flex;
justify-content:center;
align-items:center;
height:calc(100vh - 80px);
background:var(--bg);
}

/* CARD */

.card{
background:white;
padding:30px;
width:650px;
border-radius:18px;
box-shadow:0 15px 40px rgba(124,58,237,0.15);
display:flex;
flex-direction:column;
}

/* TITLE */

.card h1{
color:var(--violet);
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:15px;
}

/* CHAT BOX */

.chat-box{
height:350px;
overflow-y:auto;
border:1px solid #eee;
border-radius:12px;
padding:15px;
margin-bottom:15px;
background:#fafafa;
}

/* MESSAGE */

.msg{
padding:10px 14px;
margin-bottom:10px;
border-radius:10px;
max-width:75%;
font-size:14px;
line-height:1.4;
}

/* USER MESSAGE */

.user{
background:#ede9fe;
margin-left:auto;
text-align:right;
}

/* AI MESSAGE */

.ai{
background:#f3f4f6;
margin-right:auto;
}

/* INPUT AREA */

.input-area{
display:flex;
gap:10px;
}

input[type="text"]{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
}

button{
padding:12px 20px;
border:none;
background:var(--violet);
color:white;
border-radius:10px;
cursor:pointer;
}

/* ANALYZE BUTTON */

.analyze-btn{
margin-top:15px;
background:#5b21b6;
width:100%;
}

/* FOOTER */

.footer{
margin-top:15px;
font-size:12px;
color:#888;
text-align:center;
}

.chat-box{
height:500px;
overflow-y:auto;
padding:20px;
background:#f5f5f5;
border-radius:10px;
margin-bottom:20px;
}

.user-msg{
background:#7c3aed;
color:white;
padding:10px 15px;
border-radius:10px;
margin-bottom:10px;
width:fit-content;
margin-left:auto;
}

.ai-msg{
background:white;
padding:10px 15px;
border-radius:10px;
margin-bottom:10px;
width:fit-content;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>


<div class="analyzer-wrapper">

<div class="card">

<h1>Safa AI</h1>

<p class="subtitle">Talk with SAFA about how you're feeling</p>

<!-- CHAT BOX -->

<div class="chat-box" id="chatBox">

{% for sender, message, timestamp in chats %}

<div class="msg {{sender}}">
{{ message }}
</div>

{% endfor %}

</div>

<!-- MESSAGE INPUT -->

<form method="POST">

<div class="input-area">

<input type="text"
name="message"
placeholder="Type your message..."
required>

<button type="submit">Send</button>

</div>

</form>

<!-- ANALYZE CONVERSATION BUTTON -->

<form action="/analyze_conversation" method="POST">

<button class="analyze-btn" type="submit">
Analyze Conversation
</button>

</form>

<div class="footer">
Educational tool only – not medical diagnosis
</div>

</div>

</div>

<script>

/* AUTO SCROLL CHAT */

const chatBox = document.getElementById("chatBox");

if(chatBox){
chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

{% endblock %}
