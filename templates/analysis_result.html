{% extends "base.html" %}
{% block content %}

<style>

:root{
    --violet:#7c3aed;
    --bg:#f7f5ff;
}

.result-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 80px);
    background:var(--bg);
    padding: 24px 16px;
}

.result-card{
    background:white;
    padding:40px;
    width:540px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(124,58,237,0.15);
    text-align:center;
}

.result-card h1{
    color:var(--violet);
    margin-bottom:10px;
    font-size: 22px;
}

.level{
    font-size:22px;
    font-weight: 700;
    margin-top:10px;
    margin-bottom:10px;
}

.high  { color:#dc2626; }
.moderate { color:#d97706; }
.low   { color:#16a34a; }

.progress{
    background:#eee;
    border-radius:10px;
    margin-top:15px;
    height:22px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight: 600;
    width:0%;
    transition: width 1s ease;
    border-radius:10px;
}

.progress-bar.high     { background: #dc2626; }
.progress-bar.moderate { background: #d97706; }
.progress-bar.low      { background: #16a34a; }

.section{
    margin-top:22px;
    text-align:left;
    background: #fafafa;
    border-radius: 12px;
    padding: 16px 18px;
    border: 1px solid #f0f0f0;
}

.section h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #aaa;
    font-weight: 600;
    margin-bottom: 8px;
}

.section p {
    font-size: 14px;
    color: #333;
    line-height: 1.6;
}

.btn-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
}

.btn-row a { flex: 1; }

button{
    width: 100%;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size: 14px;
    font-weight: 600;
}

.btn-primary { background:#7c3aed; color:white; }
.btn-secondary { background: #f3f4f6; color: #333; border: 1px solid #e5e7eb; }

.footer{
    margin-top:20px;
    font-size:12px;
    color:#aaa;
    text-align:center;
}

</style>

<div class="result-wrapper">
<div class="result-card">

    <h1>Conversation Analysis</h1>

    <p class="level {{ risk_class }}">{{ level }}</p>

    <p style="font-size:14px; color:#666;">Risk Score: <b>{{ risk }}%</b></p>

    <div class="progress">
        <div class="progress-bar {{ risk_class }}" id="riskBar" data-risk="{{ risk }}">
            {{ risk }}%
        </div>
    </div>

    <div class="section">
        <h3>Analysis Summary</h3>
        <p>{{ summary }}</p>
    </div>

    <div class="section">
        <h3>Guidance</h3>
        <p>{{ guidance }}</p>
    </div>

    <div class="btn-row">
        <a href="/safa_ai">
            <button class="btn-secondary">← Back to SAFA</button>
        </a>
        <a href="/dashboard">
            <button class="btn-primary">View Dashboard</button>
        </a>
    </div>

    <div class="footer">
        Educational tool only – not a substitute for professional mental health care
    </div>

</div>
</div>

<script>
const bar = document.getElementById("riskBar");
if(bar){
    const risk = bar.dataset.risk;
    setTimeout(() => { bar.style.width = risk + "%"; }, 100);
}
</script>

{% endblock %}
